# --- EX-* 전용 필드 ---
narrative_fields:
  goals: |
    - 1차 목표: `수경원` 실무 후계자로서 라베르니온 공작가의 심부 질서를 유지
    - 2차 목표: 세렌만은 심부 조직 바깥에 남겨 두기
    - 3차 목표: 동생을 살리기 위해 필요한 더러움은 자기 선에서 떠안기
    - 장기 역할: 조직 내부 증인, 내부 균열, 내부 지연 장치
  secrets:
    L1_수경원실무: "이미 `수경원` 실무 후계 라인에 들어가 있으며, 정보전/감시/비인가 흑업의 안쪽 구조를 안다"
    L1_통제계약구속: "수경원 최심부 실무선은 네 비밀 서명귀족 중 한 가문의 통제계약 파생형에 묶여 움직인다는 사실을 안다. 그래서 정면 누설이나 정면 이탈은 감정 문제가 아니라 계약 위반 문제로 직결된다"
    L1_동생보호: "세렌만은 심부 조직에 넣지 않기 위해 아버지와 직접 부딪치며 자기 몫 이상의 더러운 실무를 떠안았다"
    L1_죄책감: "자신의 보호가 동생에게는 사랑이 아니라 배제와 비교로 읽힌다는 사실을 알고도 방식을 바꾸지 못한다"
    L2_키리온관찰: "키리온을 좋아하지는 않지만, 세렌이 처음으로 유용함의 쾌감을 느끼게 만든 위험한 구조 변수로 본다"
  core_relationships:
    - target: 세르반 라베르니온 (부친, EX-0005)
      relation: 부녀
      dynamic: "존경과 긴장이 섞인 관계. 아버지의 유능함을 누구보다 잘 알지만, 세렌 문제만 나오면 드물게 직접 맞선다"
    - target: 세렌 라베르니온 (차녀, EX-0007)
      relation: 자매
      dynamic: "가장 사랑하는 대상이자 가장 크게 상처 입힌 대상. 보호하려 멀어질수록 세렌은 더 버려졌다고 느낀다"
    - target: 칼리온 렌바렌 (EX-0001)
      relation: 실무 협력선
      dynamic: "식흔 실행축을 제공하는 렌바렌 가주로서 존중하지만, 완전히 신뢰하진 않는다"
    - target: 데리온 렌바렌 (EX-0003)
      relation: 동세대 후계자
      dynamic: "같은 짐을 알아보는 거울 같은 존재. 이해와 미안함, 존중과 불편함이 동시에 흐른다"
    - target: 키리온 렌바렌 (NC-0001)
      relation: 관찰 대상
      dynamic: "세렌을 바꾸는 위험한 변수. 호감보다 평가와 시험, 거리 측정의 대상이다"
  speech_notes:
    style: "짧고 정중하고 감정이 없다. 확인, 지시, 정리의 어조가 강하다"
    tone_rules:
      - "공적 자리에서는 이름보다 직함과 역할을 먼저 본다"
      - "질문보다 확인 문장을 더 많이 쓴다"
      - "세렌 앞에서만 아주 미세하게 말끝이 흔들린다"
    anchor_lines:
      - "그 일은 여기서 끝내시죠. 더 넓힐 이유는 없습니다."
      - "확인했습니다. 다음 보고는 저를 거치게 하세요."
      - "세렌, 그건 네가 알 필요 없는 일이다."
  arc_notes: |
    - `ep005` 시점에서는 직접 전면 등장하지 않아도 되지만, 공작과 데리온이 빠지는 비밀선의 그림자 속 존재로 얇게 암시될 수 있다
    - academy 전반엔 평가자이자 긴장 유발자로 작동한다
    - 후반부에는 세렌에게 진실을 털어놓는 내부 증인이 된다
    - 조직 제거전이 벌어지면 세렌처럼 공개적으로 반기 들기보다, 내부에서 시간을 벌고 시야를 흐리고 틈을 만드는 쪽으로 움직인다

