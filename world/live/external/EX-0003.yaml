# --- EX-* 전용 필드 ---
narrative_fields:
  goals: |
    - 1차 목표: 렌바렌 후계자로서 식흔 비밀을 유지하고 칼리온의 기대를 저버리지 않기
    - 2차 목표: 여동생을 어떻게든 살리는 길 찾기
    - 3차 목표: 언젠가 다른 세 비밀 서명귀족 가문 집행자들이 와도 키리온이 버티고 리리아를 지켜줄 수 있을지 모른다는 불가능한 희망에 매달리기
    - 단기 행동: 키리온이 게시판 구조 설계나 비전투형 마법에만 몰입하지 못하게 하고, `무흔술` 기초를 포함한 실전형 무력을 억지로라도 쥐여준다
  secrets:
    L1_가문비밀인지: "두 달 전 `계승조회식` 이후 자신이 식흔 후계자이며, 장차 타 비밀 서명귀족 가문이 자기 형제자매를 방계 청소 대상으로 삼을 수 있다는 사실을 전수받음"
    L1_여동생공포: "가장 아끼는 여동생까지 언젠가 타가문 정리망의 손에 죽을 수 있다는 공포를 숨기고 있음"
    L1_키리온기대: "키리온을 미친 듯이 단련시키는 이유는, 실질적으로 불가능하다는 걸 알면서도 언젠가 타가문 집행자들을 막고 리리아를 지켜줄 변수로 만들고 싶기 때문이다. 그래서 일반 귀족 품새가 아니라 `무흔술` 기초까지 몸에 박아 넣으려 든다. 칼리온에게 전날 교정받은 내용을 다음날 키리온과의 대련으로 다시 재현하는 식이라, 체계적 사사보다 폭력적인 복습에 가깝다"
    L1_침묵계약공포: "후계자 비밀은 네 비밀 서명귀족 중 한 가문의 통제계약 비전을 가공한 침묵계약 아래 전수되므로, 키리온이나 리리아에게 사실을 알려 주는 순간 즉시 발각되고 자신도 큰 패널티를 입으며 동생들은 곧바로 살처분선에 오른다는 걸 안다"
    L2_키리온진실_현재: "초기에는 키리온의 외래성/이상 상태를 모름. 훗날 칼리온이 '그래도 내 아들이 맞다'고 판정한 뒤 관련 진실 일부를 듣게 되는 축"
  core_relationships:
    - target: 칼리온 렌바렌 (부친, EX-0001)
      relation: 부자
      dynamic: "두려움과 동경이 뒤섞인 대상. 인정받고 싶지만, 물려받은 짐 자체를 증오한다"
    - target: 셀리아 그라비온 (모친, EX-0002)
      relation: 모자
      dynamic: "어머니를 안심시키고 싶어 더 모범적으로 군다. 오히려 그래서 더 숨긴다"
    - target: 키리온 렌바렌 (차남, 주인공)
      relation: 형제
      dynamic: "원래는 투닥거리던 대등한 동생. 후계 비밀을 안 뒤에는 '언젠가 타가문 손에 죽게 둘지도 모르는 약한 동생'으로 보다가, 점점 '혹시 저놈이 리리아를 지켜 줄 마지막 변수일지도 모른다'는 기대와, 그 기대 자체의 비현실성에서 오는 질투가 함께 커진다. 그래서 귀족 자제용 품새가 아니라 `무흔술` 기초를 동생 몸에 우겨 넣으려 한다. 다만 본인도 아직 열 살이라 교범식 사사가 아니라, 전날 칼리온에게 배운 교정을 다음날 형제 대련으로 거칠게 되풀이하는 수준에 머문다"
    - target: 리리아 렌바렌 (막내딸, EX-0004)
      relation: 남매
      dynamic: "브라콤 수준으로 과보호. 완전히 어린아이로 보며, 그녀를 지키지 못할 가능성 앞에서 가장 쉽게 무너진다"
  speech_notes:
    style: "짧고 단정적이며 지시문이 많다. 감정이 커질수록 오히려 더 건조하고 통제적인 문장을 사용한다"
    anchor_lines:
      - "네 방식이 뭔지는 상관없다. 죽지만 마."
      - "생각은 마음대로 해. 몸까지 약해지는 건 허락 안 해."
      - "다친 건 괜찮다. 못 일어나는 건 안 된다."
  arc_notes: |
    - 프롤로그 직전: 혼란 속에서 키리온에게 `무흔술`식 기초를 우겨 넣으려다 목검으로 거의 기절할 정도로 때림
    - 초반: 연무장으로 키리온을 계속 끌고 나와 일반 귀족 훈련처럼 위장된 `무흔술` 기초와 실전형 무력을 강제로 쥐여준다. 이유는 단순 짜증이 아니라, 언젠가 올 타가문 집행자들 앞에서 버틸 변수로 만들고 싶은 절박함이다
    - 전수 병목: 데리온은 아직 열 살이라 `무흔술`의 조직용 교범, 암살 공작 후처리, 정치적 맥락까지 가르칠 수는 없다. 대신 전날 칼리온에게서 교정받은 발, 각도, 첫 박자, 붕괴 지점을 다음날 키리온과의 대련으로 재현하며 "몸의 답"만 남긴다
    - 중반 이전 독자 체감: 짜증나는 강압형 형이지만, 그가 억지로 심은 기본기와 전투 감각이 반복적으로 키리온을 살린다
    - 학술원 진입 후에도 방학 귀가 때마다 몇 주간 `쓸 만한 칼이 됐는지` 직접 시험하며, 키리온이 비전투 마법 쪽으로 더 기울어질수록 오히려 `무흔술` 단련을 끊지 못하게 붙든다
    - 배경 전제: 데리온 본인도 이 희망이 거의 불가능하다는 걸 안다. 그래서 더더욱 집착은 강박처럼 보이고, 세르반 라베르니온은 그 위태로운 선 넘기를 알고도 비교적 온건한 판단으로 묵인한다
    - 중후반: 데리온이 키리온 관련 진실 일부를 듣고, 기대/질투/원망이 더 복합화된다
    - 장기 목표: 독자 감정이 '성가신데 유용한 형'에서 '트루 브라더'로 폭발적으로 전환되는 축

