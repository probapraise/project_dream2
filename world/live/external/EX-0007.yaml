narrative_fields:
  goals: |
    - 1차 목표: 언니보다 뒤처진 아이가 아니라, 실제로 유용한 사람으로 인정받기
    - 2차 목표: 키리온이 보는 구조와 쓰임을 이해하고, 자기 권한으로 실제로 굴릴 수 있게 만들기
    - 3차 목표: 후반부에는 공작가의 공개 권력과 명분을 들고 나와 키리온 편의 균형추 되기
    - 장기 역할: 기능적 동료 우선의 히로인 후보군 / 공개 권력의 내부 반란 축
  secrets:
    L1_수경원비인지: "차녀인 세렌은 현재 `수경원`의 존재와 자기 가문 심부 구조를 모른다"
    L1_언니열등감: "사리엔이 늘 더 중요한 사람으로 보였기에, 언니를 사랑하면서도 깊은 열등감을 품고 있다"
    L1_유용함중독: "게시판 사건 이후 `내가 끼어들자 일이 좋아졌다`는 감각에 강하게 매료된다"
    L1_익명성그림자: "익명 공간이 열리면 눌린 비교심과 증명 욕구가 공격적이고 음습한 댓글로 샐 수 있다"
  core_relationships:
    - target: 세르반 라베르니온 (부친, EX-0005)
      relation: 부녀
      dynamic: "존경과 승인 욕구의 대상. 아버지의 관심을 받고 싶지만, 늘 언니와 비교된다고 느낀다"
    - target: 사리엔 라베르니온 (장녀, EX-0006)
      relation: 자매
      dynamic: "사랑하지만 가장 강한 열등감의 원천. 보호받고 있다는 사실은 모르고, 늘 자신만 바깥에 남겨졌다고 느낀다"
    - target: 키리온 렌바렌 (NC-0001)
      relation: 기능적 동료 / 잠재 히로인 후보
      dynamic: "처음엔 이상한 백작가 차남으로 보지만, 곧 자신을 공작가 딸이 아니라 `일 굴릴 사람`으로 다루는 데 끌린다. 호감보다 `이 사람 옆에 있으면 나도 쓸모 있어질 수 있다`는 감각이 먼저다"
    - target: 리리아 렌바렌 (EX-0004)
      relation: 첫 친구
      dynamic: "자기를 공작가 차녀가 아니라 또래 아이로 끌어내는 존재. 리리아 덕분에 격식 없는 관계의 리듬을 처음 배운다"
    - target: 칼리온 렌바렌 (EX-0001)
      relation: 경계 섞인 호기심
      dynamic: "아버지와 가까운 실무 귀족으로 인식한다. 아직 숨은 위계는 모르지만, 키리온에게 심문처럼 말을 거는 순간을 본능적으로 불편하게 느낄 수 있다"
  speech_notes:
    style: "교과서적으로 단정한 귀족 영애 말투. 긴장하면 더 예의를 차리고, 감정이 흔들리면 문장이 짧아진다"
    tone_rules:
      - "또래에게도 처음엔 약간 과하게 예의를 갖춘다"
      - "리리아 앞에서는 가장 먼저 말투가 풀린다"
      - "키리온에게 질문할 때만 체면보다 이해 욕구가 앞선다"
    anchor_lines:
      - "처음 뵙겠습니다. 세렌 라베르니온이에요."
      - "왜 그걸 먼저 보지? 다들 책 제목을 보는데."
      - "너는 늘 이상한데, 이상해서 더 설명을 듣고 싶어."
  arc_notes: |
    - `ep005`: 연회장에서 고립된 공작가 여식으로 첫 등장, 게시판 사건을 통해 처음으로 `유용함의 고양감`을 맛본다
    - `ep006`: 스스로 키리온과의 동행을 강하게 원하고, `색인의 그리모어` 장면에서 키리온의 시야에 기능적으로 매료된다
    - academy 초반: 키리온과 자주 붙으며 플랫폼/권한/소문 축을 여는 핵심 캐릭터가 된다
    - 후반: 언니가 자신을 지켜 왔다는 진실을 알고도 조직 편에 서지 않고, 오히려 이 썩은 구조를 부숴 언니를 해방시키려는 쪽으로 간다

