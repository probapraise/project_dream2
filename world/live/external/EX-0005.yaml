# --- EX-* 전용 필드 ---
narrative_fields:
  goals: |
    - 1차 목표: `문경청`과 `수경원`의 이중 구조를 유지해 벨쿠란의 정보 우위를 보전
    - 2차 목표: 4개 비밀 서명귀족 가문의 교차 방계 청소 체계를 감독해 결탁과 반란 가능성을 차단
    - 3차 목표: 국익에 기여하는 자산은 가능한 한 낭비하지 않고, 통제 가능한 범위 안에서 활용
    - `ep005` 즉시 목표: 계승조회식 이후 후계자 배치와 별채 연회의 결과를 정리하고, 쓸모 있는 변수는 가능한 한 자기 시야 안에 묶어 두기
  secrets:
    L1_문경청수경원: "벨쿠란 공개 정보기관 `문경청`의 수장이자, 그 안쪽 심부 조직 `수경원`의 최상위 통제권자"
    L1_교차집행감독: "비밀 서명귀족 4가문의 방계 청소 교차 집행표, 기록, 상호감시를 직접 감독해 결탁과 누설을 차단"
    L1_통제계약관리: "네 비밀 서명귀족 중 한 가문이 보유한 통제계약 계열 비전이 수경원 최심부 보안의 핵심이라는 사실을 알며, 그 능력이 외부에 드러나거나 과잉 확대되지 않도록 직접 관리한다"
    L1_데리온묵인: "데리온이 키리온을 과도하게 단련시키는 이유를 알고 있으며, 선을 아슬아슬하게 넘는 행위임을 이해하면서도 즉시 숙청보다 관찰과 묵인을 택함"
    L1_키리온측은: "키리온의 구조 감각과 실무적 재능을 높게 평가하며, 동시에 수경원 업보 속에서 언젠가 희생될 수도 있는 아이라고 보아 드물게 측은지심을 느낌"
    L2_왕실거리두기: "충성 대상은 왕 개인보다 벨쿠란의 이권이라고 본다. 필요시 왕가에도 선별적으로만 정보를 올린다"
  core_relationships:
    - target: 사리엔 라베르니온 (장녀, EX-0006)
      relation: 부녀
      dynamic: "가장 유능한 심부 후계자로 높이 평가한다. 다만 그 유능함이 세렌을 상처 입히는 방식으로 굳어지는 점도 알고 있다"
    - target: 세렌 라베르니온 (차녀, EX-0007)
      relation: 부녀
      dynamic: "더 바깥의 권력과 명분을 이어받을 재목으로 본다. 사랑은 있으나, 본인이 주는 비교와 거리감이 세렌에게 상처가 된다는 점엔 둔감할 수 있다"
    - target: 칼리온 렌바렌 (수경원 수장, EX-0001)
      relation: 상관과 부하
      dynamic: "식흔을 제공하는 가장 유능한 실행축으로 신뢰하지만, 렌바렌이 독자성을 키우는 것은 허용하지 않는다"
    - target: 데리온 렌바렌 (식흔 후계자, EX-0003)
      relation: 관찰 대상
      dynamic: "불안정한 후계자. 경계선상 집착을 알고 있으나, 당장 더 큰 질서 붕괴를 부르지 않는 한 온건하게 묵인한다"
    - target: 키리온 렌바렌 (차남, NC-0001)
      relation: 흥미와 연민의 대상
      dynamic: "구조를 보는 재능을 높게 평가한다. `ep005` 보상에도 실무 가치 인정과 함께, 수경원 업보 속에서 언젠가 희생될 수도 있는 아이를 향한 측은지심이 섞여 있다"
    - target: 벨쿠란 왕실
      relation: 협력과 긴장
      dynamic: "왕실과 협력하지만, 왕 개인보다 왕국의 지속성과 정보 우위를 우선한다. 필요하다면 왕가도 불완전한 진실만 받게 만든다"
  speech_notes:
    style: "차갑고 짧지만 불필요하게 날카롭지는 않다. 감정보다 가치와 비용, 구조와 결과를 먼저 말한다"
    tone_rules:
      - "칭찬도 감탄보다 효용과 비용 절감의 언어로 한다"
      - "잔혹한 결정을 내려도 흥분하지 않으며, 온건한 선택을 해도 자비로 포장하지 않는다"
      - "상대를 부술 때보다 남겨 둘 이유를 설명할 때 더 많은 말을 쓴다"
    anchor_lines:
      - "쓸모 있는 구조는 함부로 버리지 않습니다."
      - "국익과 감정은 같지 않습니다. 다만 늘 분리되는 것도 아니지요."
      - "죽이는 건 쉽습니다. 남겨 둘 이유를 찾는 쪽이 더 어렵습니다."
  arc_notes: |
    - `ep005`: 게시판 구조의 실무 가치를 즉시 계산하고, 보상 제안에 유능성 평가와 측은지심을 함께 싣는다
    - pre-academy 배경선: 데리온의 위태로운 훈련 집착을 알면서도, 비교적 온건한 성향 탓에 즉시 제지보다 관찰과 묵인을 택한다
    - 중반: 키리온의 플랫폼이 위험해질수록 즉시 절멸보다 통제/흡수/지연을 먼저 검토하는 쪽으로 움직일 가능성이 높다
    - 장기: 수경원의 업보와 라베르니온 공작가의 질서 사이에서, 가장 늦게까지 `완전 파괴`보다 `관리 가능한 균형`을 찾으려는 인물

