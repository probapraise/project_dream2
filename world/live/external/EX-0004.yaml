# --- EX-* 전용 필드 ---
narrative_fields:
  goals: |
    - 1차 목표: 오빠 둘과 계속 같이 놀고, 집 안 분위기를 자기가 좋아하는 쪽으로 끌고 가기
    - 2차 목표: 나중에 키리온이 만드는 커뮤니티/플랫폼에서 사람이 몰리는 얼굴과 분위기를 책임지기
    - 장기 역할: 인스타 계열 인싸용 쓰레드 관리자이자 플랫폼 최고 인기 인플루언서로 성장
  secrets:
    L1_그라비온잔향: "정식 문장비전 계승자는 아니지만, 그라비온 진위감정 혈통의 미세한 잔향이 남아 있어 사람의 표정/말결/분위기 변화를 유난히 잘 읽는다"
    L1_가문비밀비인지: "렌바렌 비밀, 식흔, 방계 청소 관행을 전혀 모른다"
  core_relationships:
    - target: 칼리온 렌바렌 (부친, EX-0001)
      relation: 부녀
      dynamic: "아버지를 어렵게 여기지만 겁먹지는 않는다. 칼리온도 이 아이 앞에선 비교적 강압을 줄인다"
    - target: 셀리아 그라비온 (모친, EX-0002)
      relation: 모녀
      dynamic: "가장 편안한 기준점. 밝고 살가운 성향과 사람 읽는 감각을 셀리아 쪽에서 많이 물려받았다"
    - target: 데리온 렌바렌 (장남, EX-0003)
      relation: 남매
      dynamic: "데리온이 브라콤 수준으로 아끼는 대상. 리리아 본인은 그 과보호를 답답한 오빠 취급으로 가볍게 넘기지만, 누구보다 쉽게 그의 경직을 푼다"
    - target: 키리온 렌바렌 (차남, 주인공)
      relation: 남매
      dynamic: "키리온과 가장 죽이 잘 맞는다. 나중에는 플랫폼 운영의 핵심 조력자가 되어, 키리온이 못 만드는 대중성과 온도를 채워준다"
  speech_notes:
    style: "짧고 밝으며 반응이 빠르다. 질문과 감탄이 많고, 상대를 슬쩍 놀리면서도 기분 상하게 하지 않는다"
    tone_rules:
      - "분위기가 가라앉으면 일부러 가벼운 화제를 먼저 던진다"
      - "부탁도 명령도 애교와 확신이 섞인 형태로 말한다"
      - "진심일수록 오히려 더 가볍게 포장해 말하는 경향이 있다"
    anchor_lines:
      - "오빠, 그건 너무 딱딱해."
      - "근데 그거 재미는 있겠네?"
      - "다들 너무 심각해. 보기만 해도 숨 막혀."
  arc_notes: |
    - 프롤로그/1화 간접 인상: 밤꿀절편을 좋아하고, 오빠가 안 일어나면 자기가 대신 아카데미에 먼저 입학하겠다고 할 만큼 들이대는 밝은 막내
    - 초중반 독자 체감: 절대 미워할 수 없는 집안의 햇빛
    - 플랫폼 단계: 키리온이 만든 구조에 얼굴과 열기를 붙이고, 인싸용 쓰레드/홍보/유행 포맷을 장악하는 핵심 인물
    - 위험 서사 기능: 리리아가 위협받는 순간 독자와 인물 모두가 즉시 행동해야 한다는 감정을 불러내는 축
    - 데리온 재평가 기능: 왜 데리온이 이 아이만큼은 어떻게든 지키려 했는지를 독자가 본능적으로 납득하게 만드는 장치

