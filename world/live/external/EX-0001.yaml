# EX-0001 — 칼리온 렌바렌 (Kalion Renbaren)
# created: 2026-03-05
# source: 기획 대화 (프롤로그 설계)

id: EX-0001
name: 칼리온 렌바렌
name_roman: Kalion Renbaren
role: 렌바렌 백작가 가주 / 렌바렌 성의 성주
affiliation: 렌바렌 백작가 (표면: 라베르니온 공작가 분가 / 비공개: 수경원 수장)

b5:
  O: 0.72   # 고대 유산 파편·금역 회수물을 능숙히 다루는 지적 유연성
  C: 0.89   # 극도의 자기 통제, 수경원 수장으로서의 체계성
  E: 0.61   # 사교적이되 주도권을 양보하지 않는 절제된 외향
  A: 0.38   # 낮은 친화 — 정보를 공유하지 않음, 필요 시 냉혹한 결정
  N: 0.12   # 거의 동요하지 않음, 아들의 외래성도 유레카로 전환

derived:
  DT: 0.62  # 중-상 어둠 성향 — 기만(이중 신분)과 조종을 일상적으로 운용
  NFC: 0.84 # 매우 높은 인지 욕구 — 아들의 이상 행동에서 '고대 지식'을 즉각 추론
  SM: 0.91  # 극도의 자기 제시 통제 — 비밀 서명귀족의 이중 생활 유지

status: named
ch_id: null

# --- EX-* 전용 필드 ---
narrative_fields:
  goals: |
    - 1차 목표: 렌바렌 가문의 비밀(서명귀족 지위 + 식흔) 유지
    - 2차 목표: 세르반 라베르니온이 거느린 `문경청/수경원` 체계에 식흔을 제공해 벨쿠란의 정보 우위를 유지
    - 3차 목표: 후계 구도 안정화 — 장남의 `계승조회식` 이후 식흔 후계 승계를 통제하고, 비후계 자식이 방계 청소망으로 넘어가는 시점까지 라인을 흔들림 없이 유지
    - 프롤로그 즉시 목표: 키리온의 '외래성/이상 상태'를 자신만의 비밀로 관리
  secrets:
    L1_가문비밀: "렌바렌은 비밀 서명귀족, 흑 주색 문장비전 식흔(蝕痕) 보유 — 왕실 핵심+라베르니온 공작가 당주 라인+가주+후계자(장남)만 인지"
    L1_수경원위계: "벨쿠란 공개 정보기관은 `문경청`, 그 안쪽 극비 심부 조직은 `수경원`. 칼리온은 수경원 수장이며, 실질 상관은 문경청 수장 세르반 라베르니온 공작"
    L1_방계청소: "비밀 서명귀족은 4가문 교차 집행 체계로 방계 청소를 운용한다. 한 가문의 비후계 형제자매는 나머지 세 가문이 청소하며, 라베르니온 공작가가 그 배치와 감시를 감독한다"
    L1_침묵계약: "후계자 비밀 전수는 네 비밀 서명귀족 중 한 가문의 통제계약 비전을 가공한 `수경원` 표준 침묵계약을 동반한다. 형제자매에게 기밀을 누설하면 즉시 발각되며, 누설자는 마법적 패널티를 받고 청취자는 살처분 대상으로 격상된다"
    L1_왕도검증: "왕실은 서명귀족 본가/분가에서 갈라진 뒤 아직 `활성 혈통권`이 남아 있는 아동을 10세가 되는 해 왕도로 불러 `계승조회식`으로 계승 여부를 일괄 검증하며, 가문의 조기 사설 검증은 엄금한다"
    L1_조기수련금지: "벨쿠란은 계승조회식 이전 아동의 마나 회로/마나핵 활성화 보조를 금지하며, 적발 시 반역죄급 조사와 영지 특별감사가 시작된다"
    L1_무흔술전승: "수경원은 식흔만으로 덮이지 않는 공작을 위해 비마나 실전 전투술 `무흔술`을 수백 년간 체계화해 왔고, 렌바렌 직계도 일반 귀족 무예 훈련으로 위장된 기초 전승을 함께 익힌다"
    L1_무흔술묵인: "칼리온은 데리온이 비후계 차남 키리온에게 `무흔술`을 가르치는 일이 위험한 선타기임을 알지만, 자신이 데리온에게 전날 교정한 정본 일부가 다음날 형제 대련으로 키리온에게 재전달되는 구조까지 알고도 묵인한다. 조기 마법 수련 금지를 건드리지 않으면서도 차남에게 최소한의 생존 버퍼를 남기고 통제 가능한 변수로 길들일 수 있다고 보기 때문이다"
    L2_열구진실: "열구와 잔향역의 심층 진실 — 각국 최상위 정보 요인만 인지"
    L3_키리온외래성: "키리온에게 외래 기억의 잔향이 덧입혀졌다는 사실 — 백작 본인만 인지, 왕가에 미보고"
  core_relationships:
    - target: 키리온 렌바렌 (주인공, 차남)
      relation: 부자
      dynamic: "이상 행동을 감지하고 '고대 유산 계열 절차 지식의 잔향'으로 해석 → 자산으로 전환. 동시에 비후계 차남으로서 장기적으로는 정리 가능한 말로 본다."
    - target: 셀리아 그라비온 (부인, EX-0002)
      relation: 부부
      dynamic: "부인에게 가문 비밀을 공유하지 않음 — 그라비온 진위감정 능력이 역으로 위험 요인"
    - target: 데리온 렌바렌 (장남, EX-0003)
      relation: 부자
      dynamic: "현 식흔 후계자. 두 달 전 `계승조회식` 이후 가문 비밀과 방계 청소 구조를 전수받아 흔들리고 있다. 칼리온은 데리온이 전날 자기에게 받은 `무흔술` 교정을 다음날 키리온과의 대련으로 거칠게 재연하는 구조를 알지만, 차기 가주 훈련과 통제 실험의 일부로 간주해 당장은 묵인한다"
    - target: 리리아 렌바렌 (막내딸, EX-0004)
      relation: 부녀
      dynamic: "가문 비밀 미인지. 장남 승계가 완료되면 타 비밀 서명귀족 가문의 방계 청소망 표적이 될 수 있는 막내지만, 칼리온조차 이 아이 앞에서는 계산이 잠시 흐려지는 순간이 있다"
    - target: 세르반 라베르니온 (라베르니온 공작, EX-0005)
      relation: 실질 상관
      dynamic: "문경청 수장이자 수경원 상위 통제권자. 칼리온은 식흔을 제공하는 심부 실행축으로 그 지휘선 아래 움직인다. 세르반은 비교적 온건해 데리온의 경계선상 훈련 집착도 즉시 숙청보다 관찰과 묵인을 택한다"
    - target: 라베르니온 공작가
      relation: 표면적 상위가문
      dynamic: "분가를 가장하되, 실제로는 문경청/수경원 체계의 실권자. 렌바렌은 식흔 제공 대가로 보호받는 종속 파트너"
    - target: 벨쿠란 왕실
      relation: 비밀 서약 관계
      dynamic: "왕실이 렌바렌의 비밀 서명귀족 지위를 보장 + 10세 계승조회식 독점 + 장남 후계자의 비전관 면제 및 비밀 보호 + 방계 청소 관행 결과 묵인"
  arc_notes: |
    - 프롤로그: 아들의 '로그아웃' 발언 → 외래성 감지 → 유레카(고대 유산 계열 지식 자산화)
    - 직전 과거사: 장남이 두 달 전 `계승조회식`을 통과해 후계자 비밀을 전수받았고, 그 혼란 속에서 키리온에게 `무흔술` 기초를 우겨 넣으려다 목검으로 거의 기절할 정도로 때렸다.
    - pre-academy 운용 원리: 칼리온이 데리온에게 정본 `무흔술`을 교정하면, 데리온은 다음날 키리온과의 대련에서 그 교정을 설명 없는 압박과 교정 동작으로 다시 흘려보낸다.
    - 중반: 키리온이 각인광장을 만들며 정보 독점 구조가 흔들림 → 백작의 딜레마
    - 장기: 장남 승계가 가까워질수록 키리온과 여동생의 생존 리스크가 정치 문제로 부상
    - 핵심 갈등: 정보 통제자인 아버지 vs 정보 개방자인 아들

community_eligible: false
