name_roman: Kalion Renbaren
role: 렌바렌 백작가 가주 / 벨쿠란 왕국 최상위 정보기관 명예직 수장
affiliation: 렌바렌 백작가 (표면: 라베르니온 공작가 분가)

b5:
  O: 0.72   # 고대 문명 파편·외계 유입을 능숙히 다루는 지적 유연성
  C: 0.89   # 극도의 자기 통제, 정보기관 수장으로서의 체계성
  E: 0.61   # 사교적이되 주도권을 양보하지 않는 절제된 외향
  A: 0.38   # 낮은 친화 — 정보를 공유하지 않음, 필요 시 냉혹한 결정
  N: 0.12   # 거의 동요하지 않음, 아들의 빙의도 유레카로 전환

derived:
  DT: 0.62  # 중-상 어둠 성향 — 기만(이중 신분)과 조종을 일상적으로 운용
  NFC: 0.84 # 매우 높은 인지 욕구 — 아들의 이상 행동에서 '고대 지식'을 즉각 추론
  SM: 0.91  # 극도의 자기 제시 통제 — 비밀 서명귀족의 이중 생활 유지

status: named
ch_id: null

# --- EX-* 전용 필드 ---
narrative_fields:
  goals: |
    - 1차 목표: 렌바렌 가문의 비밀(서명귀족 지위 + 식흔) 유지
    - 2차 목표: 라베르니온 공작가 정보 체계에 식흔을 제공해 벨쿠란의 정보 우위를 유지
    - 3차 목표: 후계 구도 안정화 — 장남의 `계승조회식` 이후 식흔 후계 승계를 통제하고, 비후계 자식 정리 시점까지 라인을 흔들림 없이 유지
    - 프롤로그 즉시 목표: 키리온의 '빙의/이상 상태'를 자신만의 비밀로 관리
  secrets:
    L1_가문비밀: "렌바렌은 비밀 서명귀족, 흑 주색 문장비전 식흔(蝕痕) 보유 — 왕실 핵심+라베르니온 공작가 당주 라인+가주+후계자(장남)만 인지"
    L1_방계청소: "식흔 발현은 랜덤이므로 승계 완료 후 형제자매를 암살해 방계를 청소하는 관행이 존재"
    L1_왕도검증: "왕실은 서명귀족 혈통 아동을 10세가 되는 해 왕도로 불러 `계승조회식`으로 계승 여부를 일괄 검증하며, 가문의 조기 사설 검증은 엄금한다"
    L1_조기수련금지: "벨쿠란은 계승조회식 이전 아동의 마나 회로/마나핵 활성화 보조를 금지하며, 적발 시 반역죄급 조사와 영지 특별감사가 시작된다"
    L2_열구진실: "열구를 통한 외계 문명 유입의 실체 — 각국 최상위 정보 요인만 인지"
    L3_키리온빙의: "키리온이 빙의/대체되었다는 사실 — 백작 본인만 인지, 왕가에 미보고"
  core_relationships:
    - target: 키리온 렌바렌 (주인공, 차남)
      relation: 부자
      dynamic: "이상 행동을 감지하고 '고대 문명 지식 주입'으로 해석 → 자산으로 전환. 동시에 비후계 차남으로서 장기적으로는 정리 가능한 말로 본다."
    - target: 셀리아 그라비온 (부인, EX-0002)
      relation: 부부
      dynamic: "부인에게 가문 비밀을 공유하지 않음 — 그라비온 진위감정 능력이 역으로 위험 요인"
    - target: 데리온 렌바렌 (장남, EX-0003)
      relation: 부자
      dynamic: "현 식흔 후계자. 두 달 전 `계승조회식` 이후 가문 비밀과 방계 청소 의무를 전수받아 흔들리고 있으나, 칼리온은 그를 차기 가주로 단련 중"
    - target: 리리아 렌바렌 (막내딸, EX-0004)
      relation: 부녀
      dynamic: "가문 비밀 미인지. 장남 승계가 완료되면 구조적으로 정리 대상이 될 수 있는 막내지만, 칼리온조차 이 아이 앞에서는 계산이 잠시 흐려지는 순간이 있다"
    - target: 라베르니온 공작가
      relation: 표면적 상위가문
      dynamic: "분가를 가장하되, 실제로는 수면거울 정보망의 실권자. 렌바렌은 식흔 제공 대가로 보호받는 종속 파트너"
    - target: 벨쿠란 왕실
      relation: 비밀 서약 관계
      dynamic: "왕실이 렌바렌의 비밀 서명귀족 지위를 보장 + 10세 계승조회식 독점 + 장남 후계자의 비전관 면제 및 비밀 보호 + 방계 청소 관행 묵인"
  arc_notes: |
    - 프롤로그: 아들의 '로그아웃' 발언 → 빙의 감지 → 유레카(고대 지식 자산화)
    - 직전 과거사: 장남이 두 달 전 `계승조회식`을 통과해 후계자 비밀을 전수받았고, 그 혼란 속에서 키리온을 목검으로 거의 기절할 정도로 때렸다.
    - 중반: 키리온이 각인광장을 만들며 정보 독점 구조가 흔들림 → 백작의 딜레마
    - 장기: 장남 승계가 가까워질수록 키리온과 여동생의 생존 리스크가 정치 문제로 부상
    - 핵심 갈등: 정보 통제자인 아버지 vs 정보 개방자인 아들

community_eligible: false
