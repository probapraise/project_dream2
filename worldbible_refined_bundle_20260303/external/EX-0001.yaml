# --- EX-* 전용 필드 ---
narrative_fields:
  goals: |
    - 1차 목표: 렌바렌 가문의 비밀(서명귀족 지위 + 식흔) 유지
    - 2차 목표: 벨쿠란 왕국의 정보 우위 확보 (열구 외계 유입 관리)
    - 3차 목표: 후계 구도 안정화 — 딸(문장비전 후계)과 아들들의 역할 배치
    - 프롤로그 즉시 목표: 키리온의 '빙의/이상 상태'를 자신만의 비밀로 관리
  secrets:
    L1_가문비밀: "렌바렌은 비밀 서명귀족, 흑 주색 문장비전 식흔(蝕痕) 보유 — 왕실+가주+후계자(여동생)만 인지"
    L2_열구진실: "열구를 통한 외계 문명 유입의 실체 — 각국 최상위 정보 요인만 인지"
    L3_키리온빙의: "키리온이 빙의/대체되었다는 사실 — 백작 본인만 인지, 왕가에 미보고"
  core_relationships:
    - target: 키리온 렌바렌 (주인공, 차남)
      relation: 부자
      dynamic: "이상 행동을 감지하고 '고대 문명 지식 주입'으로 해석 → 자산으로 전환"
    - target: 셀리아 렌바렌 née 그라비온 (부인, EX-0002)
      relation: 부부
      dynamic: "부인에게 가문 비밀을 공유하지 않음 — 그라비온 진위감정 능력이 역으로 위험 요인"
    - target: 여동생 (문장비전 후계자, 미명명)
      relation: 부녀
      dynamic: "유일한 식흔 후계자 — 왕실 특별 보호 하에 학술원 재학"
    - target: 장남 (미명명)
      relation: 부자
      dynamic: "문장비전 미보유, 가문 비밀 미인지 — 표면적 후계자/방패 역할"
    - target: 라베르니온 공작가
      relation: 표면적 상위가문
      dynamic: "분가를 가장하되, 실제로는 식흔이 수면거울을 은폐 → 공생적 정보 독점"
    - target: 벨쿠란 왕실
      relation: 비밀 서약 관계
      dynamic: "왕실이 렌바렌의 비밀 서명귀족 지위를 보장 + 딸의 비전관 면제"
  arc_notes: |
    - 프롤로그: 아들의 '로그아웃' 발언 → 빙의 감지 → 유레카(고대 지식 자산화)
    - 중반: 키리온이 각인광장을 만들며 정보 독점 구조가 흔들림 → 백작의 딜레마
    - 핵심 갈등: 정보 통제자인 아버지 vs 정보 개방자인 아들

